<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradNode" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4CAF50"/>
            <stop offset="100%" stop-color="#2196F3"/>
        </linearGradient>
        <style type="text/css"><![CDATA[
            @keyframes fadeInOut {
                0%, 100% { opacity: 0.2; }
                50% { opacity: 1; }
            }
            @keyframes pulseScale {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.05); }
            }
            .node {
                animation: fadeInOut 3s infinite ease-in-out alternate;
                transform-origin: center;
            }
            .connector {
                animation: fadeInOut 4s infinite ease-in-out alternate;
            }
            .main-circle {
                animation: pulseScale 2s infinite ease-in-out alternate;
                transform-origin: center;
            }
        ]]></style>
    </defs>

    <!-- Main animated elements -->
    <circle cx="300" cy="150" r="50" fill="url(#gradNode)" class="main-circle"/>
    <circle cx="200" cy="100" r="20" fill="#BBDEFB" class="node" style="animation-delay: 0.5s;"/>
    <circle cx="400" cy="100" r="20" fill="#BBDEFB" class="node" style="animation-delay: 1s;"/>
    <circle cx="250" cy="220" r="20" fill="#BBDEFB" class="node" style="animation-delay: 1.5s;"/>
    <circle cx="350" cy="220" r="20" fill="#BBDEFB" class="node" style="animation-delay: 2s;"/>

    <line x1="300" y1="150" x2="200" y2="100" stroke="url(#gradNode)" stroke-width="2" class="connector" style="animation-delay: 0.2s;"/>
    <line x1="300" y1="150" x2="400" y2="100" stroke="url(#gradNode)" stroke-width="2" class="connector" style="animation-delay: 0.4s;"/>
    <line x1="300" y1="150" x2="250" y2="220" stroke="url(#gradNode)" stroke-width="2" class="connector" style="animation-delay: 0.6s;"/>
    <line x1="300" y1="150" x2="350" y2="220" stroke="url(#gradNode)" stroke-width="2" class="connector" style="animation-delay: 0.8s;"/>

    <!-- Title text -->
    <text x="50%" y="350" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle">AI Marketing</text>
</svg>