<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style type="text/css"><![CDATA[
            @keyframes floatUp {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-15px); }
            }
            @keyframes dataFlow {
                0% { transform: translateY(0); opacity: 0; }
                50% { opacity: 1; }
                100% { transform: translateY(-50px); opacity: 0; }
            }
            .floating-cloud { animation: floatUp 4s infinite ease-in-out; }
            .data-point { animation: dataFlow 2s infinite ease-out; }
        ]]></style>
    </defs>

    <!-- Main animated elements -->
    <g class="floating-cloud" transform="translate(0, 0)">
        <path d="M170 150 Q150 100 200 100 T300 100 T400 100 Q450 100 430 150 T300 200 T170 150Z" fill="#ADD8E6" opacity="0.9"/>
        <path d="M220 180 Q200 150 250 150 T350 150 Q400 150 380 180 T270 200 T220 180Z" fill="white" opacity="0.9" style="transform:translateY(10px);"/>
    </g>

    <circle cx="280" cy="200" r="5" fill="#4CAF50" class="data-point" style="animation-delay: 0.5s;"/>
    <circle cx="320" cy="210" r="5" fill="#2196F3" class="data-point" style="animation-delay: 1s;"/>
    <circle cx="300" cy="190" r="5" fill="#FFC107" class="data-point" style="animation-delay: 1.5s;"/>

    <!-- Title text -->
    <text x="50%" y="350" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle">Cloud Computing</text>
</svg>