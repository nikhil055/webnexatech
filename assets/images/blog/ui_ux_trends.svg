<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style type="text/css"><![CDATA[
            @keyframes fadeIn {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
            @keyframes slideInUp {
                0% { transform: translateY(20px); opacity: 0; }
                100% { transform: translateY(0); opacity: 1; }
            }
            @keyframes clickPulse {
                0%, 100% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.2); opacity: 0.5; }
            }
            .screen-bg { animation: fadeIn 1s forwards ease-out; }
            .ui-element { animation: slideInUp 0.8s forwards ease-out; opacity: 0; }
            .cursor { animation: fadeIn 0.5s forwards ease-out; }
            .click-effect { animation: clickPulse 0.5s ease-out; transform-origin: center; }
        ]]></style>
    </defs>

    <!-- Main animated elements -->
    <rect x="150" y="70" width="300" height="200" rx="15" ry="15" fill="#F0F0F0" class="screen-bg"/>
    <rect x="170" y="90" width="260" height="30" fill="#E0E0E0" class="ui-element" style="animation-delay: 0.5s;"/>
    <rect x="170" y="130" width="100" height="30" fill="#FFC107" rx="5" ry="5" class="ui-element" style="animation-delay: 0.7s;"/>
    <rect x="280" y="130" width="150" height="30" fill="#4CAF50" rx="5" ry="5" class="ui-element" style="animation-delay: 0.9s;"/>
    <circle cx="200" cy="200" r="10" fill="#2196F3" class="ui-element click-effect" style="animation-delay: 1.2s;"/>

    <path d="M430 80 L440 90 L430 100 Z" fill="#333" class="cursor" style="transform-origin: 435px 90px;">
        <animateMotion path="M0 0 L-20 20 L-50 100 L-100 150" dur="3s" repeatCount="indefinite" rotate="auto"/>
    </path>


    <!-- Title text -->
    <text x="50%" y="350" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle">UI/UX Trends</text>
</svg>