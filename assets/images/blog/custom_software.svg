<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style type="text/css"><![CDATA[
            @keyframes fadeIn {
                0% { opacity: 0; }
                100% { opacity: 1; }
            }
            @keyframes scaleIn {
                0% { transform: scale(0); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            @keyframes dashDraw {
                0% { stroke-dashoffset: 1000; }
                100% { stroke-dashoffset: 0; }
            }
            .fade-in { animation: fadeIn 1s forwards ease-out; opacity: 0; }
            .scale-in { animation: scaleIn 0.8s forwards ease-out; opacity: 0; transform-origin: center; }
            .path-draw {
                stroke-dasharray: 1000;
                stroke-dashoffset: 1000;
                animation: dashDraw 2s forwards ease-out;
            }
        ]]></style>
    </defs>

    <!-- Main animated elements -->
    <g class="scale-in" style="animation-delay: 0.5s;">
        <rect x="150" y="80" width="300" height="150" rx="10" ry="10" fill="#E0E0E0"/>
        <line x1="160" y1="100" x2="440" y2="100" stroke="#607D8B" stroke-width="3" class="path-draw" style="animation-delay: 0.7s;"/>
        <line x1="160" y1="130" x2="350" y2="130" stroke="#90A4AE" stroke-width="3" class="path-draw" style="animation-delay: 0.9s;"/>
        <line x1="160" y1="160" x2="400" y2="160" stroke="#90A4AE" stroke-width="3" class="path-draw" style="animation-delay: 1.1s;"/>
        <line x1="160" y1="190" x2="300" y2="190" stroke="#90A4AE" stroke-width="3" class="path-draw" style="animation-delay: 1.3s;"/>
        <line x1="160" y1="220" x2="440" y2="220" stroke="#607D8B" stroke-width="3" class="path-draw" style="animation-delay: 1.5s;"/>
    </g>

    <circle cx="400" cy="180" r="30" fill="#4CAF50" class="scale-in" style="animation-delay: 1.7s;"/> <!-- A subtle "complete" or "build" indicator -->

    <!-- Title text -->
    <text x="50%" y="350" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle">Custom Software</text>
</svg>